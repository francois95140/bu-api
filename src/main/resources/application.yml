spring:
  application:
    name: bibliotheque

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/bibliotheque
    username: esgi
    password: esgi

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: false

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    try-it-out-enabled: true
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,loggers

# Justification : la clé JWT doit être surchargée par variable d'environnement JWT_SECRET en production (jamais en dur)
jwt:
  secret: ${JWT_SECRET:bu-api-default-dev-secret-must-be-at-least-256-bits-long-in-prod}
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000
